<!-- Renkli Kutular Seti Tasarlayın

Bu örnek projeye işlevsel olarak benzer bir uygulama oluşturun. Örnek projeyi aynen kopyalamamaya çalışın, ona kendi kişisel tarzınızı katın.

Bu alıştırmada, kutular tasarlayarak CSS renklerini kullanma pratiği yapacağız.

Amaç: Aşağıdaki kullanıcı hikayelerini yerine getirin ve tüm testlerin başarılı olmasını sağlayarak alıştırmayı tamamlayın.

Kullanıcı Hikayeleri:

1. body öğesinin arka plan rengini #f4f4f4 olarak ayarlamalısınız.
2. Tüm renk öğelerinizi barındıracak, color-grid sınıfına sahip bir div öğesi olmalıdır.
3. .color-grid öğesi içinde beş div öğesi olmalıdır.
4. Beş div öğesinin her birinin color-box ve color# sınıfına sahip olması gerekir; burada #, o div öğesinin sıra numarasıdır. 
Örneğin: ilk div için color1, ikinci div için color2 ve benzeri.
5. .color-box sınıfının genişlik ve yüksekliği belirlenmiş olmalıdır; böylece div öğeleriniz sayfada görünür hale gelir.
6. .color1 öğesinin arka plan rengi onaltılık renk değeri kullanmalıdır.
7. .color2 öğesinin arka plan rengi RGB renk değeri kullanmalıdır.
8. .color3 öğesinin arka plan rengi önceden tanımlanmış (kelime) renk değeri kullanmalıdır.
9. .color4 öğesinin arka plan rengi HSL renk değeri kullanmalıdır.
10. .color5 öğesinin arka plan rengi ayarlanmalıdır.

Not: Stil sayfanızı HTML dosyanıza eklediğinizden ve CSS'inizi uyguladığınızdan emin olun.

Not: Aşağıdaki yazılan kodlar tüm adımların tamamlandığı çalışmadır.

-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colored Boxes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Colored Boxes</h1>
    <div class="color-grid">
      <div class="color-box color1"></div>
      <div class="color-box color2"></div>
      <div class="color-box color3"></div>
      <div class="color-box color4"></div>
      <div class="color-box color5"></div>
    </div>
  </body>
</html>
